# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication/USART.

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# Printer Specs:
# -Ender 3 
# -Mcu: BTT SKR E3 V3.0.
# -2x Z axis
# -Sprite Extruder Pro Kit
# -CR Touch

# -------------------INCLUDE SECTIONN-------------------------------------------------

# -------------------RESONANCE TEST------------
# [include InputShaper.cfg]  # Comment this out when you disconnect the accelerometer
# ---------------------------------------------
[include Spoolman.cfg]
[include shelly.cfg]
[include PrintAction.cfg]
[include Wled.cfg]
# [include LedBanco.cfg] #  WORK IN PROGRESS
[include timelapse.cfg]
[include config_backup.cfg]
[include calibrate_flow.cfg]
[include fluidd.cfg]
[include Line_Purge.cfg]
# [include adaptive_mesh.cfg] # vecchia! KAAMP
[include Smart_Park.cfg]
[include KAMP_Settings.cfg]
[include BTTrunoutSensor.cfg]
[include SpeedTest.cfg]
[include fw_retract.cfg]

# -------------------G34 GANTRY LEVELLING-------------------------------------------------

# [force_move]  # !!!!!!!!!!!!ONLY FOR GANTRY LEVELLING!!!!!!!!!!!!!!!!!!!!!!

# -------------------IDLE TIMEOUT-------------------------------------------------

[idle_timeout]
timeout: 1800
gcode:
    TURN_OFF_HEATERS
    M84  ; disabilita motori
    M106 S0  ; spegni ventola
    LIGHT_OFF

# -------------------EXCLUDE OBJECT-------------------------------------------------

[exclude_object]

# -------------------MCU-------------------------------------------------

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_21004A001450415833323520-if00
restart_method: command

# -------------------PI/MCU TEMPERATURE-------------------------------------------------

[temperature_sensor pi_temp]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# -------------------VIRTUAL SDCARD-------------------------------------------------

[virtual_sdcard]
path: ~/printer_data/gcodes

# -------------------MORE-------------------------------------------------

[display_status]

[pause_resume]

# -------------------SCREEN TILT ADJUST-------------------------------------------------

[screws_tilt_adjust]
screw1: 62, 72
screw1_name: front left screw
screw2: 230, 72
screw2_name: front right screw
screw3: 230, 215
screw3_name: rear right screw
screw4: 62, 215
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 200.
screw_thread: CW-M4

# -------------------MACHINE SECTIONN-------------------------------------------------

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 230 # 238
homing_speed: 150
second_homing_speed: 25

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 0  # SpreadCycle for precision at high speed
interpolate: true

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 32
endstop_pin: ^PC1
position_endstop: -30
position_min: -30
position_max: 215
homing_speed: 150
second_homing_speed: 25

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.650  # ridotto da 0.9 — guide lineari richiedono meno corrente
stealthchop_threshold: 0  # SpreadCycle for precision at high speed
interpolate: true

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
# endstop_pin: ^PC2
# position_endstop: 0.0
endstop_pin: probe:z_virtual_endstop
position_max: 230
position_min: -3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580 # 0.450
# hold_current: 0.500
stealthchop_threshold: 999999
interpolate: true

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 6.872 # 7.744
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
min_extrude_temp: 170
max_extrude_cross_section: 5 # Allows more to be extruded in a short distance for KAMP Line_Purge

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 0  # SpreadCycle — necessario per Pressure Advance con direct drive
interpolate: true

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan heatbreak_cooling_fan]
pin: PC7

[heater_fan controller_fan]
pin: PB15
# heater: heater_bed
# heater_temp: 45.0

[fan]
pin: PC6
kick_start_time: 0.5
off_below: 0.21

[input_shaper]
#shaper_freq_x: 57.6
#shaper_type_x: mzv
#shaper_freq_y: 37.2
#shaper_type_y: mzv

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 4000
minimum_cruise_ratio: 0.5
max_z_velocity: 10
max_z_accel: 100

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

# -------------------EXTRA SECTIONN-------------------------------------------------

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -30
y_offset: -42
#z_offset: 3.0
speed: 30 # 20
lift_speed: 30 # 15
pin_move_time: 0.68
stow_on_each_sample: false
probe_with_touch_mode: true

[safe_z_home]
home_xy_position: 144,144 # Change coordinates to the center of your print bed
speed: 200 # 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 30 # 30 funzionante - originale - 5

[bed_mesh]
speed: 200
horizontal_move_z: 7
mesh_min: 10, 10
mesh_max: 200, 173
probe_count: 6,6
algorithm: bicubic

# vecchia KAAMP bed mesh
# [bed_mesh]
# speed: 150
# horizontal_move_z: 7
# mesh_min: 10, 10
# mesh_max: 200, 168
# probe_count: 6,6

######################################################################
#  BigTreeTech TFT TouchScreen emulated 12864 mode
######################################################################

[display]
lcd_type: emulated_st7920
spi_software_miso_pin: PD8 # status led, Virtual MISO
spi_software_mosi_pin: PD6
spi_software_sclk_pin: PB9
en_pin: PB8
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

######################################################################
#  START END CANCEL MACROS
######################################################################

# ================================================================================
# GCode Macro: PRINT_START
# Aggiungi PRINT_START nello script di avvio dello Slicer. 
# ================================================================================

[gcode_macro PRINT_START]
gcode:
    backup_cfg
    LIGHT_HEATING
    M117 PRE HEATING
    {% set BED = params.BED_TEMP|int %}
    {% set EXTRUDER = params.EXTRUDER_TEMP|int %}
    M104 S140  ; pre-heat nozzle senza oozing
    M190 S{BED}  ; attendi temperatura bed
    LIGHT_ON
    G28 ; Home all axes
    G90 ; forza absolute positioning
    M117 BED MESH CALIBRATE
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1
    LIGHT_HEATING
    Smart_Park
    M117 HEATING EXTRUDER
    M109 S{EXTRUDER}  ; attendi temperatura extruder
    LIGHT_ON
    G92 E0
    M117 LINE PURGE
    Line_Purge
    M117 BTT SENSOR ON
    SET_FILAMENT_SENSOR SENSOR=btt_motion_sensor ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=btt_switch_sensor ENABLE=1
  
# ================================================================================
# GCode Macro: END_PRINT
# Aggiungi END_PRINT nello script di fine dello Slicer. 
# ================================================================================

[gcode_macro END_PRINT]
gcode:
    LIGHT_SUCCESS
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    # Retract veloce per evitare stringing
    M83 ; Relative E
    G1 E-3 F1800 ; retract 3mm a 30mm/s
    # Allontana il nozzle dal pezzo
    G91 ; Relative XYZ
    G1 X-2 Y-2 Z+5 F3000
    G90 ; Absolute XYZ
    M82 ; Absolute E
    M104 S0 ; spegni hotend
    M140 S0 ; spegni bed
    M106 S50 ; ventola al 20% per proteggere heatbreak
    # Presenta il pezzo
    G1 X0 Y{max_y} F5000
    # Disabilita stepper tranne Z (evita caduta gantry)
    M84 X Y E
    LIGHT_OFF
    M117 BTT SENSOR OFF
    SET_FILAMENT_SENSOR SENSOR=btt_motion_sensor ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=btt_switch_sensor ENABLE=0
    BED_MESH_CLEAR

# ================================================================================
# GCode Macro: CANCEL_PRINT
# ================================================================================

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    M220 S100 ; Reset Speed factor override
    M221 S100 ; Reset Extrude factor override
    G91
    {% if printer.extruder.temperature >= 170 %}
        G1 F1800 E-5 ; Retract 5mm
    {% endif %}
    {% if printer.toolhead.homed_axes == "xyz" %}
        G1 F6000 Z10
        G90
        G1 X10 Y{printer.toolhead.axis_maximum.y|float} F6000
    {% endif %}
    LIGHT_ERROR
    M117 CANCEL PRINT
    M106 S0
    CLEAR_PAUSE
    BASE_CANCEL_PRINT
    M117 BTT SENSOR OFF
    SET_FILAMENT_SENSOR SENSOR=btt_motion_sensor ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=btt_switch_sensor ENABLE=0
    BED_MESH_CLEAR
    UPDATE_DELAYED_GCODE ID=_CANCEL_LIGHT_OFF DURATION=10

[delayed_gcode _CANCEL_LIGHT_OFF]
gcode:
    LIGHT_OFF

######################################################################
#  LOAD / UNLOAD MACROS
######################################################################

[gcode_macro LOAD_FILAMENT]
variable_load_distance: 50
variable_purge_distance: 40
gcode:
    {% set temp = params.TEMP|default(250)|int %}
    {% set speed = params.SPEED|default(300)|int %}
    {% set is_printing = printer.pause_resume.is_paused or printer.idle_timeout.state == "Printing" %}
    SAVE_GCODE_STATE NAME=load_state
    # Auto-heat se necessario
    {% if printer.extruder.temperature < printer.configfile.settings.extruder.min_extrude_temp %}
        M117 HEATING FOR LOAD...
        M109 S{temp}
    {% endif %}
    # Park solo se non in stampa (durante stampa sei gia in pause position)
    {% if not is_printing %}
        {% if printer.toolhead.homed_axes != "xyz" %}
            G28
        {% endif %}
        G90
        G1 X2 Y2 Z50 F3000
    {% endif %}
    M83
    G92 E0
    G1 E{load_distance} F600  ; fast-load
    G1 E{purge_distance} F{speed}  ; purge lenta
    G1 E-0.5 F1800  ; retract per evitare colature
    M117 FILAMENT LOADED
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 75
variable_purge_distance: 15
gcode:
    {% set temp = params.TEMP|default(250)|int %}
    {% set speed = params.SPEED|default(300)|int %}
    {% set is_printing = printer.pause_resume.is_paused or printer.idle_timeout.state == "Printing" %}
    SAVE_GCODE_STATE NAME=unload_state
    # Auto-heat se necessario
    {% if printer.extruder.temperature < printer.configfile.settings.extruder.min_extrude_temp %}
        M117 HEATING FOR UNLOAD...
        M109 S{temp}
    {% endif %}
    # Park solo se non in stampa
    {% if not is_printing %}
        {% if printer.toolhead.homed_axes != "xyz" %}
            G28
        {% endif %}
        G90
        G1 X2 Y2 Z50 F3000
    {% endif %}
    M83
    G92 E0
    G1 E{purge_distance} F{speed}  ; purge breve per compattare
    G1 E-{unload_distance} F600  ; fast-unload
    M117 FILAMENT UNLOADED
    RESTORE_GCODE_STATE NAME=unload_state

